<!doctype html>
<html>
   <head>
      <title>Udemy Downloader - Settings</title>
      <meta charset="utf-8">
      <link rel="stylesheet" href="Plugins/Bootstrap-4-4.1.1/css/bootstrap.min.css">
      <script type="text/javascript" src="Plugins/jquery-3.5.1.min.js"></script>
      <script src="Plugins/lucide.min.js"></script>
      <link rel="stylesheet" href="css/custom.css">
      <style>
         body { 
           padding: 40px 20px; 
           background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
         }
         .settings-container {
           max-width: 800px;
           margin: 0 auto;
         }
         .settings-card { 
           background: var(--bg-surface); 
           padding: 40px; 
           border-radius: var(--radius-lg); 
           border: 1px solid var(--glass-border);
           box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
           backdrop-filter: var(--glass-blur);
         }
         .form-control {
           background: var(--bg-elevated);
           border: 1px solid var(--glass-border);
           color: var(--text-main);
           border-radius: var(--radius-md);
           padding: 12px 16px;
           height: auto;
         }
         .form-control:focus {
           background: var(--bg-elevated);
           border-color: var(--brand-primary);
           color: var(--text-main);
           box-shadow: 0 0 0 4px rgba(164, 53, 240, 0.1);
         }
         label {
           font-weight: 600;
           color: var(--text-main);
           margin-bottom: 8px;
           display: flex;
           align-items: center;
           gap: 8px;
         }
         label i {
           color: var(--brand-primary-light);
           width: 18px;
           height: 18px;
         }
         .settings-title {
           font-size: 28px;
           font-weight: 800;
           margin-bottom: 30px;
           background: var(--brand-gradient);
           -webkit-background-clip: text;
           -webkit-text-fill-color: transparent;
           display: flex;
           align-items: center;
           gap: 15px;
         }
      </style>
   </head>
   <body>
      <div class="settings-container">
         <div class="settings-card shadow-sm">
            <h1 class="settings-title">
               <img src="logo.png" style="width: 48px; filter: drop-shadow(0 0 10px rgba(164, 53, 240, 0.5));">
               General Settings
            </h1>
            
            <form id="settingsForm">
               <div class="row">
                  <div class="col-md-6">
                     <div class="form-group mb-4">
                        <label for="defaultFolder"><i data-lucide="folder"></i> Download Path Prefix</label>
                        <input type="text" class="form-control" id="defaultFolder" placeholder="e.g. Udemy Download/">
                        <small class="form-text text-muted">Base folder in Chrome Downloads. Must end with /</small>
                     </div>
                  </div>
                  <div class="col-md-6">
                     <div class="form-group mb-4">
                        <label for="namingTemplate"><i data-lucide="type"></i> Naming Template</label>
                        <input type="text" class="form-control" id="namingTemplate" placeholder="{video_index}. {video_title}">
                        <small class="form-text text-muted">Placeholders: {instructor}, {course}, {chapter}, {video_index}, {video_title}</small>
                     </div>
                  </div>
               </div>

               <div class="row">
                  <div class="col-md-6">
                     <div class="form-group mb-4">
                        <label for="defaultQuality"><i data-lucide="monitor"></i> Video Quality</label>
                        <select class="form-control" id="defaultQuality">
                           <option value="1080">1080p</option>
                           <option value="720">720p</option>
                           <option value="480">480p</option>
                           <option value="360">360p</option>
                           <option value="highest">Highest Available</option>
                           <option value="lowest">Lowest Available</option>
                        </select>
                     </div>
                  </div>
                  <div class="col-md-6">
                     <div class="form-group mb-4">
                        <label for="defaultSubtitle"><i data-lucide="subtitles"></i> Subtitle Locale</label>
                        <input type="text" class="form-control" id="defaultSubtitle" placeholder="e.g. en_US">
                     </div>
                  </div>
               </div>

               <div class="form-group mb-4">
                  <div class="custom-control custom-switch">
                     <input type="checkbox" class="custom-control-input" id="defaultAssets" checked>
                     <label class="custom-control-label" for="defaultAssets">Download Supplementary Assets by Default</label>
                  </div>
               </div>

               <div class="row">
                  <div class="col-md-6">
                     <div class="form-group mb-4">
                        <label for="apiDelay"><i data-lucide="clock"></i> API Request Delay (ms)</label>
                        <input type="number" class="form-control" id="apiDelay" value="500">
                     </div>
                  </div>
                  <div class="col-md-6">
                     <div class="form-group mb-4">
                        <label for="downloadDelay"><i data-lucide="zap"></i> Download Delay (ms)</label>
                        <input type="number" class="form-control" id="downloadDelay" value="2000">
                     </div>
                  </div>
               </div>

               <div class="border-top pt-4 mt-2 d-flex align-items-center justify-content-between">
                  <div>
                    <button type="submit" class="btn btn-pill btn-success px-5 py-3">
                      <i data-lucide="save"></i>
                      Save Configuration
                    </button>
                    <span id="saveStatus" class="ml-3 text-success font-weight-bold" style="opacity: 0; transition: opacity 0.3s;">Saved Successfully!</span>
                  </div>
                  <div class="text-muted" style="font-size: 13px;">Udemy Downloader v1.0.0</div>
               </div>
            </form>
         </div>
      </div>
      <script src="options.js"></script>
      <script>
        if (window.lucide) { lucide.createIcons(); }
      </script>
   </body>
</html>
