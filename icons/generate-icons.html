<!doctype html>
<html>
<head><meta charset="utf-8"><title>Generate Extension Icons</title></head>
<body>
<h3>Icon Generator — UdemyDownloader</h3>
<p>Open this file in your browser (from the project root so logo.png loads). Icons will download automatically.</p>
<canvas id="c" style="display:none"></canvas>
<script>
  const sizes = [16, 48, 128];
  const img = new Image();
  img.src = '../logo.png';
  img.onload = () => {
    sizes.forEach(size => {
      const canvas = document.getElementById('c');
      canvas.width  = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, size, size);
      ctx.drawImage(img, 0, 0, size, size);
      const a = document.createElement('a');
      a.download = 'icon' + size + '.png';
      a.href = canvas.toDataURL('image/png');
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    });
    document.body.innerHTML += '<p style="color:green;font-weight:bold">Done! Move the 3 downloaded PNGs into the icons/ folder.</p>';
  };
  img.onerror = () => {
    document.body.innerHTML += '<p style="color:red">Could not load ../logo.png — open this file via a local server or from the project root.</p>';
  };
</script>
</body>
</html>
